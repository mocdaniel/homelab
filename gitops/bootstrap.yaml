---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-cluster
  namespace: argocd
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    path: gitops/
    repoURL: https://github.com/mocdaniel/homelab
    targetRevision: HEAD
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
